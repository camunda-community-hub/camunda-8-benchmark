name: Build, test and deploy artifacts with Maven

on:
  push:
    branches: [main]
  release:
    types: [published]
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v7
      - name: Set up Java environment
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin
          cache: maven
          gpg-private-key: ${{ secrets.MAVEN_CENTRAL_GPG_SIGNING_KEY_SEC }}
          gpg-passphrase: MAVEN_CENTRAL_GPG_PASSPHRASE
      - name: Build with Maven
        id: build
        run: mvn -B -U -Dsurefire.rerunFailingTestsCount=5 clean install
      - name: Archive Test Results on Failure
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: test-results
          path: |
            target/surefire-reports/
            target/failsafe-reports/
          retention-days: 7
      - name: Publish Unit Test Results
        id: publish
        uses: EnricoMi/publish-unit-test-result-action@v2.24.0
        if: failure()
        with:
          junit_files: |
            target/surefire-reports/*.xml
            target/failsafe-reports/*.xml
# Skip deployment to Maven Central until this issue is fixed:
# https://github.com/camunda-community-hub/camunda-8-benchmark/issues/149
#      - name: Deploy SNAPSHOT / Release
#        uses: camunda-community-hub/community-action-maven-release@v1
#        with:
#          release-version: ${{ github.event.release.tag_name }}
#          release-profile: community-action-maven-release
#          nexus-usr: ${{ secrets.NEXUS_USR }}
#          nexus-psw: ${{ secrets.NEXUS_PSW }}
#          maven-usr: ${{ secrets.MAVEN_CENTRAL_DEPLOYMENT_USR }}
#          maven-psw: ${{ secrets.MAVEN_CENTRAL_DEPLOYMENT_PSW }}
#          maven-gpg-passphrase: ${{ secrets.MAVEN_CENTRAL_GPG_SIGNING_KEY_PASSPHRASE }}
#          github-token: ${{ secrets.GITHUB_TOKEN }}
#        id: release
      - if: github.event.release
        name: Attach artifacts to GitHub Release (Release only)
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ${{ steps.release.outputs.artifacts_archive_path }}
          asset_name: ${{ steps.release.outputs.artifacts_archive_path }}
          asset_content_type: application/zip
  push_to_registry:
    needs: publish
    name: Push Docker image to Docker Hub
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v7
      - name: Set up Java environment
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin
          cache: maven
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USR }}
          password: ${{ secrets.DOCKERHUB_PSW }}
      - name: Determine image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=main" >> "$GITHUB_OUTPUT"
          fi
      - name: Build image with Cloud Native Buildpacks (via spring-boot:build-image)
        run: |
          mvn -B spring-boot:build-image -Dmaven.test.skip=true \
            -Dspring-boot.build-image.imageName=camundacommunityhub/camunda-8-benchmark:${{ steps.tag.outputs.tag }}
      - name: Push Docker image
        run: docker push camundacommunityhub/camunda-8-benchmark:${{ steps.tag.outputs.tag }}
